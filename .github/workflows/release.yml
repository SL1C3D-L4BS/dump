# Phase 6: Automated Distribution Pipeline
# Builds DUMP CLI with Rust core (CGO) on tag push (v*); publishes to GitHub Releases.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build binaries (CGO + Rust)
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ''
            rust_target: x86_64-unknown-linux-gnu
          - runs-on: macos-latest
            goos: darwin
            goarch: arm64
            ext: ''
            rust_target: aarch64-apple-darwin
          - runs-on: windows-latest
            goos: windows
            goarch: amd64
            ext: '.exe'
            rust_target: x86_64-pc-windows-gnu

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Build Rust core
        run: cargo build --release --target ${{ matrix.rust_target }}
        working-directory: internal/core-rs

      - name: Copy Rust lib to path Go expects
        run: |
          mkdir -p internal/core-rs/target/release
          cp "internal/core-rs/target/${{ matrix.rust_target }}/release/libdump_core.a" internal/core-rs/target/release/
        shell: bash

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Go binary (CGO)
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o "dump-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" .
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dump-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          path: dump-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Move binaries into release directory
        run: |
          mkdir -p release
          find . -type f \( -name 'dump-*' -o -name 'dump-*.exe' \) -exec mv {} release/ \;

      - name: Create Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
