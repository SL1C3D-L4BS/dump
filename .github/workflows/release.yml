# Phase 6: Automated Distribution Pipeline
# Cross-compiles DUMP CLI on tag push (v*) and publishes to GitHub Releases.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o "dump-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" ./main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dump-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          path: dump-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Move binaries into release directory
        run: |
          mkdir -p release
          find . -type f \( -name 'dump-*' -o -name 'dump-*.exe' \) -exec mv {} release/ \;

      - name: Create Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
